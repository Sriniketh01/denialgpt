services:
  - type: web
    name: denialgpt
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m policy_kb.embed_pdfs && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: VOYAGE_API_KEY
        sync: false
      - key: FHIR_BASE_URL
        sync: false
      - key: DEV_ACCESS_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
